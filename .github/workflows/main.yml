name: my new workflow
on: 
  push:
  workflow_dispatch:
    inputs:
      log_test:
        description: to test the workflow
        type: string
        required: true
        
env:
  My_var_1: workflow variable         
      

jobs:
  my_job:
    name: my test job
    env:
      my_job_var1: job variable
    runs-on: ubuntu-latest
    steps:
      - name: test steps
        run: |
          echo "test workflow"
          echo "${{ env.My_var_1 }}"
      - name: input validation
        run: |
          echo "${{ inputs.log_test }}"
          echo "${{ env.my_job_var1 }}"
        
