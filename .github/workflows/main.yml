name: my new workflow
on: 
  push:
  workflow_dispatch:
    inputs:
      log_test:
        description: to test the workflow
        type: string
        required: true
        
env:
  My_var_1: workflow variable         
      

jobs:
  my_job1:
    name: my test job
    env:
      my_job_var1: job variable
    runs-on: ubuntu-latest
    steps:
      - name: test steps
        env:
          my_step_var1: my step variable
        run: |
          echo "test workflow"
          echo "${{ env.My_var_1 }}"
          echo $my_step_var1
          echo "STEP1_VAR=${{ env.my_step_var1 }}" >> $GITHUB_ENV
      - name: input validation
        run: |
          echo "${{ inputs.log_test }}"
          echo "${{ env.my_job_var1 }}"
          echo "${{ env.STEP1_VAR }}"

  my_job2:
    needs: my_job1
    name: test job 2
    runs-on: ubuntu-latest
    steps:
      - name: second job step1
        run: echo "${{ env.my_job1.STEP1_VAR }}"
    
        
